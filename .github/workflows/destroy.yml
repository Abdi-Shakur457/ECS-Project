
name: Destroy Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  destroy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ARN }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Scale ECS service to 0
        run: |
          aws ecs update-service \
            --cluster threat-composer-cluster \
            --service threat-composer-service \
            --desired-count 0 || true

 
      - name: Wait for ECS tasks to drain
        run: |
          echo "Waiting for ECS tasks to stop..."
          sleep 60

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve